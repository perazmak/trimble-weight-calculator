<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steel Weight Calculator v47</title>
    <script src="https://components.connect.trimble.com/trimble-connect-workspace-api/index.js"></script>
    <style>
        body { font-family: sans-serif; padding: 12px; background-color: #f4f4f4; font-size: 13px; margin: 0; }
        .version-tag { font-size: 10px; color: #888; text-align: right; margin-bottom: 5px; }
        
        .controls-row { display: flex; gap: 10px; margin-bottom: 12px; }
        .mode-toggle { display: flex; background: #e0e0e0; border-radius: 4px; overflow: hidden; flex: 1; }
        .mode-toggle input[type="radio"] { display: none; }
        .mode-toggle label { flex: 1; text-align: center; padding: 10px; font-weight: bold; cursor: pointer; color: #555; font-size: 11px; margin: 0; }
        .mode-toggle input[type="radio"]:checked + label { background: #005f9e; color: white; }
        
        .priority-box { flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .priority-box label { font-size: 10px; font-weight: bold; color: #555; margin-bottom: 2px; text-transform: uppercase; }
        .priority-box select { padding: 6px; border: 1px solid #ccc; border-radius: 4px; font-size: 11px; outline: none; }

        .section-box { background: #fff; border: 1px solid #ddd; padding: 10px; border-radius: 4px; margin-bottom: 10px; }
        .section-title { font-weight: bold; margin-bottom: 8px; color: #005f9e; font-size: 11px; text-transform: uppercase; border-bottom: 1px solid #eee; padding-bottom: 3px; }
        label.input-label { display: block; font-weight: 600; margin-bottom: 2px; font-size: 11px; color: #555; }
        input.text-input, input[type="file"] { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; margin-bottom: 10px; font-size: 12px; }
        
        .grid-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .grid-3col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        #userDefinedSettings { display: none; }

        button { color: white; border: none; padding: 12px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; margin-bottom: 10px; }
        #calcBtn { background-color: #005f9e; }
        #debugBtn { background-color: #6c757d; display: none; }
        #exportBtn { background-color: #28a745; display: none; }
        
        #status { margin-top: 10px; padding: 8px; background: #fff; border-radius: 4px; border: 1px solid #ddd; font-size: 12px; min-height: 20px; font-weight: bold; color: #333; }
        #totalBox { background-color: #333; color: white; padding: 12px; border-radius: 4px; margin-top: 10px; display: none; text-align: center; }
        #totalBox span { font-size: 20px; display: block; font-weight: bold; color: #00ccff; }

        #resultsContainer { display: none; margin-top: 15px; }
        .table-wrapper { max-height: 400px; overflow-y: auto; overflow-x: auto; border: 1px solid #ccc; background: #fff; }
        table { width: 100%; border-collapse: collapse; font-size: 10px; white-space: nowrap; }
        th, td { border: 1px solid #eee; padding: 6px; text-align: left; }
        
        thead { position: sticky; top: 0; z-index: 2; background-color: #005f9e; }
        th.sort-header { color: white; cursor: pointer; user-select: none; font-size: 10px; padding-bottom: 2px;}
        th.sort-header:hover { background-color: #004b7c; }
        .filter-row { background-color: #eef4f9; }
        .col-filter { width: 100%; padding: 4px; border: 1px solid #ccc; border-radius: 3px; box-sizing: border-box; font-size: 10px; }
        
        tr:hover { background-color: #f9f9f9; }
        .row-err { color: #d8000c; font-weight: bold; }
        .row-warn { background-color: #fff8e1; color: #d35400; font-weight: bold; }
        .row-alias { color: #f39c12; font-style: italic; }
        .row-plate { color: #005f9e; font-style: italic; }
        .col-used { background-color: #f0f7ff; font-weight: bold; }
    </style>
</head>
<body>
    <div class="version-tag">App Version: 47.0 (BigInt Patch)</div>
    <h3>Steel Weight Calc</h3>
    
    <label class="input-label">1. Load Tekla .lis file</label>
    <input type="file" id="dbFile" accept=".lis,.txt" onclick="this.value=null">

    <div class="controls-row">
        <div class="mode-toggle">
            <input type="radio" id="modeAuto" name="calcMode" value="auto" checked>
            <label for="modeAuto">AUTO PROPERTY</label>
            <input type="radio" id="modeUser" name="calcMode" value="user">
            <label for="modeUser">USER DEFINED</label>
        </div>
        <div class="priority-box">
            <label for="lenPriority">Length Priority</label>
            <select id="lenPriority">
                <option value="L,S,C">1. Length | 2. Span | 3. Cut</option>
                <option value="L,C,S">1. Length | 2. Cut | 3. Span</option>
                <option value="S,L,C">1. Span | 2. Length | 3. Cut</option>
                <option value="C,L,S">1. Cut | 2. Length | 3. Span</option>
            </select>
        </div>
    </div>

    <div id="userDefinedSettings">
        <div class="grid-3col">
            <div class="section-box">
                <div class="section-title">TYPE LOCATION</div>
                <input type="text" id="psetType" class="text-input" value="ReferenceObject" placeholder="Tab (Set) or ROOT">
                <input type="text" id="propType" class="text-input" value="Common Type" placeholder="Property Name">
            </div>
            <div class="section-box">
                <div class="section-title">LAYER LOCATION</div>
                <input type="text" id="psetLayer" class="text-input" value="Presentation Layers" placeholder="Tab (Set) or ROOT">
                <input type="text" id="propLayer" class="text-input" value="Layer" placeholder="Property Name">
            </div>
            <div class="section-box">
                <div class="section-title">PROFILE LOCATION</div>
                <input type="text" id="psetProfile" class="text-input" value="Pset_QuantityTakeOff" placeholder="Tab (Set) or ROOT">
                <input type="text" id="propProfile" class="text-input" value="Reference" placeholder="Property Name">
            </div>
        </div>
        <div class="section-box">
            <div class="section-title">LENGTH PROPERTIES LOCATION (mm)</div>
            <div class="grid-2col">
                <div>
                    <label class="input-label">Std. Length</label>
                    <input type="text" id="psetLen" class="text-input" value="Dimensions" placeholder="Tab Name">
                    <input type="text" id="propLen" class="text-input" value="Length" placeholder="Prop Name">
                </div>
                <div>
                    <label class="input-label">Span</label>
                    <input type="text" id="psetSpan" class="text-input" value="" placeholder="Tab Name (Optional)">
                    <input type="text" id="propSpan" class="text-input" value="" placeholder="Prop Name (Optional)">
                </div>
                <div>
                    <label class="input-label">Cut Length</label>
                    <input type="text" id="psetCut" class="text-input" value="" placeholder="Tab Name (Optional)">
                    <input type="text" id="propCut" class="text-input" value="" placeholder="Prop Name (Optional)">
                </div>
            </div>
        </div>
    </div>

    <button id="calcBtn" disabled>Calculate Weights v47</button>
    <button id="debugBtn">🛠️ DEBUG: Download Raw API Data</button>
    <div id="status">Please load a .lis file to begin.</div>

    <div id="totalBox">
        TOTAL WEIGHT
        <span id="totalVal">0.0000 tn</span>
    </div>

    <div id="resultsContainer">
        <div class="table-wrapper">
            <table id="resultsTable">
                <thead>
                    <tr>
                        <th class="sort-header" onclick="sortTable('guid')">GUID ↕</th>
                        <th class="sort-header" onclick="sortTable('type')">Type ↕</th>
                        <th class="sort-header" onclick="sortTable('layer')">Layer ↕</th>
                        <th class="sort-header" onclick="sortTable('profile')">Profile ↕</th>
                        <th class="sort-header" onclick="sortTable('lenStd')">Length ↕</th>
                        <th class="sort-header" onclick="sortTable('lenSpan')">Span ↕</th>
                        <th class="sort-header" onclick="sortTable('lenCut')">Cut Len ↕</th>
                        <th class="sort-header" onclick="sortTable('lenUsed')">Used mm ↕</th>
                        <th class="sort-header" onclick="sortTable('tn')">Tn ↕</th>
                        <th class="sort-header" onclick="sortTable('statusNote')">Status ↕</th>
                    </tr>
                    <tr class="filter-row">
                        <th><input type="text" class="col-filter" id="filtGuid" placeholder="Filter..." onkeyup="filterTable()"></th>
                        <th><input type="text" class="col-filter" id="filtType" placeholder="Filter..." onkeyup="filterTable()"></th>
                        <th><input type="text" class="col-filter" id="filtLayer" placeholder="Filter..." onkeyup="filterTable()"></th>
                        <th><input type="text" class="col-filter" id="filtProf" placeholder="Filter..." onkeyup="filterTable()"></th>
                        <th><input type="text" class="col-filter" id="filtLenStd" placeholder="..." onkeyup="filterTable()"></th>
                        <th><input type="text" class="col-filter" id="filtLenSpan" placeholder="..." onkeyup="filterTable()"></th>
                        <th><input type="text" class="col-filter" id="filtLenCut" placeholder="..." onkeyup="filterTable()"></th>
                        <th><input type="text" class="col-filter" id="filtLenUsed" placeholder="..." onkeyup="filterTable()"></th>
                        <th><input type="text" class="col-filter" id="filtTn" placeholder="Filter..." onkeyup="filterTable()"></th>
                        <th><input type="text" class="col-filter" id="filtStat" placeholder="Filter..." onkeyup="filterTable()"></th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
        <button id="exportBtn">Export Filtered to CSV</button>
    </div>

    <script>
        let tcAPI;
        let weightDatabase = {};
        let lastFullData = [];
        let filteredData = [];
        let sortDirection = {};

        // BIGINT Replacer Function to safely stringify Trimble APIs
        const bigIntReplacer = (key, value) => typeof value === 'bigint' ? value.toString() : value;

        TrimbleConnectWorkspace.connect(window.parent).then(api => {
            tcAPI = api;
            document.getElementById('debugBtn').style.display = "block";
            if (Object.keys(weightDatabase).length > 0) document.getElementById('calcBtn').disabled = false;
        }).catch(err => console.warn("TC API Notice:", err));

        document.querySelectorAll('input[name="calcMode"]').forEach(radio => {
            radio.addEventListener('change', function() {
                document.getElementById('userDefinedSettings').style.display = (this.value === 'user') ? 'block' : 'none';
            });
        });

        document.getElementById('dbFile').addEventListener('change', function(e) {
            try {
                const file = e.target.files[0];
                if (!file) return;
                
                document.getElementById('status').innerText = "Reading file...";
                document.getElementById('status').style.color = "#005f9e";
                
                const reader = new FileReader();
                reader.onload = function(event) {
                    try {
                        const text = event.target.result;
                        const chunks = text.split('PROFILE_NAME');
                        let count = 0;
                        for (let i = 1; i < chunks.length; i++) {
                            const nameMatch = chunks[i].match(/^\s*=\s*"([^"]+)";/);
                            const weightMatch = chunks[i].match(/"WEIGHT_PER_UNIT_LENGTH"\s+([0-9\.E\+\-]+)/);
                            if (nameMatch && weightMatch) {
                                weightDatabase[nameMatch[1].trim().toUpperCase()] = parseFloat(weightMatch[1]);
                                count++;
                            }
                        }
                        document.getElementById('status').innerText = `Database loaded (${count} profiles). Ready.`;
                        document.getElementById('status').style.color = "#28a745";
                        document.getElementById('calcBtn').disabled = false;
                    } catch (parseErr) {
                        document.getElementById('status').innerText = "Error parsing LIS: " + parseErr.message;
                        document.getElementById('status').style.color = "#d8000c";
                    }
                };
                reader.onerror = function() {
                    document.getElementById('status').innerText = "Error: Browser failed to read file.";
                    document.getElementById('status').style.color = "#d8000c";
                };
                reader.readAsText(file);
            } catch (err) {
                document.getElementById('status').innerText = "Error initiating upload: " + err.message;
                document.getElementById('status').style.color = "#d8000c";
            }
        });

        // DEBUG EXPORTER WITH BIGINT FIX
        document.getElementById('debugBtn').onclick = async function() {
            try {
                if (!tcAPI) return alert("API not ready.");
                const sel = await tcAPI.viewer.getSelection();
                if (!sel || sel.length === 0) return alert("Please select at least one item in the 3D viewer first.");
                
                const rIds = sel[0].objectRuntimeIds || [sel[0].objectId];
                const props = await tcAPI.viewer.getObjectProperties(sel[0].modelId, rIds);
                
                let coreData = "Failed to fetch core objects";
                try {
                    coreData = await tcAPI.viewer.getObjects(sel[0].modelId, rIds);
                } catch(e) { coreData = e.message; }

                const debugPayload = {
                    instructions: "Search this file for your GUID. If it's not here, Trimble Connect is blocking it from the API.",
                    selection_event: sel[0],
                    getObjectProperties_API: props,
                    getObjects_API: coreData
                };

                // Added bigIntReplacer here to prevent debug button crash
                const blob = new Blob([JSON.stringify(debugPayload, bigIntReplacer, 2)], {type: "application/json"});
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.href = url;
                link.download = "trimble_debug_data.json";
                link.click();
            } catch (err) {
                alert("Debug Tool Error: " + err.message);
            }
        };

        function getManualWeight(profileStr, lengthMm, hasValidLength) {
            const regex3D = /(?:PL|PLT|FL|FLT)\s*(\d+(?:\.\d+)?)[x\*](\d+(?:\.\d+)?)[x\*](\d+(?:\.\d+)?)/i;
            const match3D = profileStr.match(regex3D);
            if (match3D) return { weight: parseFloat(match3D[1]) * parseFloat(match3D[2]) * parseFloat(match3D[3]) * 0.00000000785, note: "Baseplate (3D String)", extLen: Math.round(Math.max(parseFloat(match3D[1]), parseFloat(match3D[2]), parseFloat(match3D[3]))) };

            const regex2D = /(?:FLT|PLT|PL|FL)\s*(\d+(?:\.\d+)?)[x\*](\d+(?:\.\d+)?)/i;
            const match2D = profileStr.match(regex2D);
            if (match2D && hasValidLength) return { weight: parseFloat(match2D[1]) * parseFloat(match2D[2]) * lengthMm * 0.00000000785, note: "Plate Calc (2D)", extLen: lengthMm };
            
            return null;
        }

        function extractTrimbleGuid(obj) {
            if (!obj || !obj.properties) return null;
            let propsArray = Array.isArray(obj.properties) ? obj.properties : Object.values(obj.properties);
            for (let pset of propsArray) {
                let innerProps = Array.isArray(pset.properties) ? pset.properties : Object.values(pset.properties || {});
                for (let prop of innerProps) {
                    let propName = (prop.name || "").toString().toLowerCase().trim();
                    if (propName === "guid" || propName === "guid (ms)" || propName === "guid (ifc)" || propName === "globalid") {
                        if (prop.value && prop.value.toString().trim().length > 10) return prop.value.toString().trim();
                    }
                }
            }
            return null;
        }

        // EXTREME X-RAY WITH BIGINT FIX
        function extremeGuidXRay(obj) {
            try {
                // Added bigIntReplacer here to prevent silent crashes
                let strDump = JSON.stringify(obj, bigIntReplacer);
                if (!strDump) return null;
                
                let uMatch = strDump.match(/[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}/);
                if (uMatch) return uMatch[0];
                
                let ifcRegex = /(?:"|')([A-Za-z0-9_\$]{22})(?:"|')/g;
                let iMatch;
                while ((iMatch = ifcRegex.exec(strDump)) !== null) {
                    let g = iMatch[1];
                    if (g.toUpperCase() !== "WEIGHT_PER_UNIT_LENGTH" && g.toUpperCase() !== "PRODUCT_REVISION_LEVEL") return g;
                }
            } catch(e) {
                console.warn("X-Ray encountered an un-stringifiable object", e);
            }
            return null;
        }

        function sniffProperties(obj) {
            let res = { types: new Set(), layers: new Set(), validProfs: new Set(), genericProfs: new Set(), lenStds: new Set(), lenSpans: new Set(), lenCuts: new Set() };
            if (obj.type) res.types.add(obj.type);
            if (obj.objectType) res.types.add(obj.objectType);

            function traverse(o, lastKey) {
                if (o === null || o === undefined) return;
                if (typeof o === 'string' || typeof o === 'number') {
                    let vStr = o.toString().trim().toUpperCase();
                    let vTrim = o.toString().trim();
                    let n = (lastKey || "").toLowerCase();

                    if (typeof o === 'string') {
                        let isExactMatch = weightDatabase[vStr];
                        let isRegexMatch = /(?:FLT|PLT|PL|FL)\s*\d+/.test(vStr);
                        let isUBMatch = vStr.startsWith("UB") && weightDatabase[vStr.replace(/^UB/, "UKB")];
                        let isUCMatch = vStr.startsWith("UC") && weightDatabase[vStr.replace(/^UC/, "UKC")];

                        if (isExactMatch || isRegexMatch || isUBMatch || isUCMatch) {
                            res.validProfs.add(o);
                        } else if (n === "profile" || n === "reference" || n.includes("cross section")) {
                            res.genericProfs.add(o);
                        }

                        if (n.includes("type") || n === "category") res.types.add(o);
                        if (n.includes("layer")) res.layers.add(o);
                        
                        if (!n.includes("bolt") && !isNaN(parseFloat(vTrim))) {
                            let num = Math.round(parseFloat(vTrim));
                            if (n.includes("cut length") || n.includes("section length")) res.lenCuts.add(num);
                            else if (n.includes("span")) res.lenSpans.add(num);
                            else if (n === "length" || n.includes("length")) res.lenStds.add(num);
                        }
                    } else if (typeof o === 'number') {
                        if (!n.includes("bolt")) {
                            let num = Math.round(o);
                            if (n.includes("cut length") || n.includes("section length")) res.lenCuts.add(num);
                            else if (n.includes("span")) res.lenSpans.add(num);
                            else if (n === "length" || n.includes("length")) res.lenStds.add(num);
                        }
                    }
                } else if (Array.isArray(o)) {
                    o.forEach(item => traverse(item, lastKey));
                } else if (typeof o === 'object') {
                    if (o.name !== undefined && o.value !== undefined) {
                        traverse(o.value, o.name.toString());
                        if (o.properties) traverse(o.properties, o.name.toString());
                    } else {
                        for (let key in o) { traverse(o[key], key); }
                    }
                }
            }
            traverse(obj, "");
            return res;
        }

        document.getElementById('calcBtn').onclick = async function() {
            const statusEl = document.getElementById('status');
            const totalValEl = document.getElementById('totalVal');
            const isAutoMode = document.getElementById('modeAuto').checked;
            const priorityOrder = document.getElementById('lenPriority').value.split(',');
            
            document.getElementById('totalBox').style.display = "block";
            totalValEl.innerText = "CALCULATING...";
            statusEl.innerText = "Accessing model data...";
            statusEl.style.color = "#333";

            lastFullData = [];
            filteredData = [];

            const psType = document.getElementById('psetType').value.trim();
            const prType = document.getElementById('propType').value.trim();
            const psLayer = document.getElementById('psetLayer').value.trim();
            const prLayer = document.getElementById('propLayer').value.trim();
            const psProf = document.getElementById('psetProfile').value.trim();
            const prProf = document.getElementById('propProfile').value.trim();
            
            const psLen = document.getElementById('psetLen').value.trim();
            const prLen = document.getElementById('propLen').value.trim();
            const psSpan = document.getElementById('psetSpan').value.trim();
            const prSpan = document.getElementById('propSpan').value.trim();
            const psCut = document.getElementById('psetCut').value.trim();
            const prCut = document.getElementById('propCut').value.trim();

            try {
                if (!tcAPI) throw new Error("Trimble Connect API not fully initialized yet.");
                
                const selection = await tcAPI.viewer.getSelection();
                if (!selection || selection.length === 0) {
                    alert("Select items in the 3D model first.");
                    totalValEl.innerText = "0.0000 tn";
                    statusEl.innerText = "Awaiting selection.";
                    return;
                }

                for (const sel of selection) {
                    const rIds = sel.objectRuntimeIds || [sel.objectId];
                    
                    const props = await tcAPI.viewer.getObjectProperties(sel.modelId, rIds);
                    
                    let coreObjs = [];
                    try {
                        coreObjs = await tcAPI.viewer.getObjects(sel.modelId, rIds);
                    } catch (e) { console.warn("Core object fetch skipped."); }
                    
                    for (const obj of props) {
                        let eGuid, eType, eLayer, eProf, eLenStd, eLenSpan, eLenCut;
                        let hasConflict = false;
                        let conflictDetails = [];

                        const cObj = coreObjs && Array.isArray(coreObjs) ? coreObjs.find(c => c.id === obj.id) : null;
                        let coreGuid = cObj ? cObj.externalId : null;

                        let exactUiGuid = extractTrimbleGuid(obj);
                        let jsonXrayGuid = null;
                        
                        eGuid = coreGuid || exactUiGuid;
                        if (!eGuid) { jsonXrayGuid = extremeGuidXRay(obj); }
                        
                        eGuid = eGuid || jsonXrayGuid || `ID:${obj.id}`;

                        if (isAutoMode) {
                            const sniffed = sniffProperties(obj);
                            
                            let profSetToUse = sniffed.validProfs.size > 0 ? sniffed.validProfs : sniffed.genericProfs;
                            eProf = profSetToUse.size > 0 ? Array.from(profSetToUse)[0] : null;

                            if (profSetToUse.size > 1) conflictDetails.push(`Prof: [${Array.from(profSetToUse).join(" vs ")}]`);
                            if (sniffed.lenStds.size > 1) conflictDetails.push(`Len: [${Array.from(sniffed.lenStds).join(" vs ")}]`);
                            if (sniffed.lenSpans.size > 1) conflictDetails.push(`Span: [${Array.from(sniffed.lenSpans).join(" vs ")}]`);

                            if (conflictDetails.length > 0) hasConflict = true;

                            eType = sniffed.types.size > 0 ? Array.from(sniffed.types)[0] : null;
                            eLayer = sniffed.layers.size > 0 ? Array.from(sniffed.layers)[0] : null;
                            eLenStd = sniffed.lenStds.size > 0 ? Array.from(sniffed.lenStds)[0] : null;
                            eLenSpan = sniffed.lenSpans.size > 0 ? Array.from(sniffed.lenSpans)[0] : null;
                            eLenCut = sniffed.lenCuts.size > 0 ? Math.min(...Array.from(sniffed.lenCuts)) : null;

                        } else {
                            const getVal = (pset, prop) => {
                                if(!pset || !prop) return null;
                                if (pset.toUpperCase() === "ROOT") {
                                    const key = Object.keys(obj).find(k => k.toLowerCase() === prop.toLowerCase());
                                    return key ? obj[key] : null;
                                }
                                let s = Array.isArray(obj.properties) ? obj.properties.find(p => p.name === pset) : obj.properties[pset];
                                return Array.isArray(s?.properties || s) ? (s.properties || s).find(p => p.name === prop)?.value : (s?.properties || s)?.[prop];
                            };
                            
                            eType = getVal(psType, prType);
                            eLayer = getVal(psLayer, prLayer);
                            eProf = getVal(psProf, prProf);
                            
                            let rawL = getVal(psLen, prLen);
                            let rawS = getVal(psSpan, prSpan);
                            let rawC = getVal(psCut, prCut);
                            
                            eLenStd = (rawL !== null && !isNaN(parseFloat(rawL))) ? Math.round(parseFloat(rawL)) : null;
                            eLenSpan = (rawS !== null && !isNaN(parseFloat(rawS))) ? Math.round(parseFloat(rawS)) : null;
                            eLenCut = (rawC !== null && !isNaN(parseFloat(rawC))) ? Math.round(parseFloat(rawC)) : null;
                        }

                        let lenUsed = null;
                        const availableLens = { 'L': eLenStd, 'S': eLenSpan, 'C': eLenCut };
                        for (let p of priorityOrder) {
                            if (availableLens[p] !== null && availableLens[p] !== undefined) {
                                lenUsed = availableLens[p];
                                break;
                            }
                        }

                        let note = "OK", tn = 0;
                        let hasValidLength = lenUsed !== null;

                        if (!eProf) {
                            note = "ERR: Missing Profile";
                        } else {
                            const profileKey = eProf.toString().trim().toUpperCase();
                            let kgPerM = weightDatabase[profileKey];
                            
                            if (!kgPerM) {
                                if (profileKey.startsWith("UB") && weightDatabase[profileKey.replace(/^UB/, "UKB")]) {
                                    kgPerM = weightDatabase[profileKey.replace(/^UB/, "UKB")];
                                    note = "Alias used (UKB)";
                                } else if (profileKey.startsWith("UC") && weightDatabase[profileKey.replace(/^UC/, "UKC")]) {
                                    kgPerM = weightDatabase[profileKey.replace(/^UC/, "UKC")];
                                    note = "Alias used (UKC)";
                                }
                            }
                            
                            if (kgPerM) {
                                if (hasValidLength) {
                                    tn = (lenUsed / 1000) * kgPerM / 1000;
                                } else {
                                    note = "ERR: Missing Length";
                                }
                            } else {
                                const manualCalc = getManualWeight(profileKey, lenUsed || 0, hasValidLength);
                                if (manualCalc) {
                                    tn = manualCalc.weight;
                                    note = manualCalc.note;
                                    lenUsed = manualCalc.extLen; 
                                } else {
                                    note = hasValidLength ? "ERR: Not in LIS" : "ERR: Not in LIS & Missing Length";
                                }
                            }
                        }

                        if (hasConflict) {
                            let conflictStr = conflictDetails.join(" | ");
                            note = (note === "OK") ? `WARN: ${conflictStr}` : `${note} (WARN: ${conflictStr})`;
                        }

                        lastFullData.push({
                            guid: eGuid || "N/A",
                            type: eType || "N/A",
                            layer: eLayer || "N/A",
                            profile: eProf || "N/A",
                            lenStd: eLenStd !== null ? eLenStd : "",
                            lenSpan: eLenSpan !== null ? eLenSpan : "",
                            lenCut: eLenCut !== null ? eLenCut : "",
                            lenUsed: lenUsed !== null ? lenUsed : "N/A",
                            tn: tn.toFixed(4),
                            statusNote: note
                        });
                    }
                }

                document.querySelectorAll('.col-filter').forEach(inp => inp.value = "");
                filteredData = [...lastFullData];
                
                renderTable();
                updateTotalWeight();
                statusEl.innerText = `Calculated ${lastFullData.length} objects.`;
                statusEl.style.color = "#28a745";
            } catch (err) {
                totalValEl.innerText = "Error";
                statusEl.innerText = "Calculation Failed: " + err.message;
                statusEl.style.color = "#d8000c";
            }
        };

        function filterTable() {
            const fGuid = document.getElementById('filtGuid').value.toLowerCase();
            const fType = document.getElementById('filtType').value.toLowerCase();
            const fLayer = document.getElementById('filtLayer').value.toLowerCase();
            const fProf = document.getElementById('filtProf').value.toLowerCase();
            const fLen  = document.getElementById('filtLenStd').value.toLowerCase();
            const fSpan = document.getElementById('filtLenSpan').value.toLowerCase();
            const fCut  = document.getElementById('filtLenCut').value.toLowerCase();
            const fUsed = document.getElementById('filtLenUsed').value.toLowerCase();
            const fTn   = document.getElementById('filtTn').value.toLowerCase();
            const fStat = document.getElementById('filtStat').value.toLowerCase();

            filteredData = lastFullData.filter(row => {
                return row.guid.toString().toLowerCase().includes(fGuid) &&
                       row.type.toString().toLowerCase().includes(fType) &&
                       row.layer.toString().toLowerCase().includes(fLayer) &&
                       row.profile.toString().toLowerCase().includes(fProf) &&
                       row.lenStd.toString().toLowerCase().includes(fLen) &&
                       row.lenSpan.toString().toLowerCase().includes(fSpan) &&
                       row.lenCut.toString().toLowerCase().includes(fCut) &&
                       row.lenUsed.toString().toLowerCase().includes(fUsed) &&
                       row.tn.toString().toLowerCase().includes(fTn) &&
                       row.statusNote.toString().toLowerCase().includes(fStat);
            });
            renderTable();
            updateTotalWeight();
        }

        function updateTotalWeight() {
            let total = filteredData.reduce((sum, row) => sum + parseFloat(row.tn), 0);
            document.getElementById('totalVal').innerText = total.toFixed(4) + " tn";
        }

        function renderTable() {
            const tbody = document.querySelector("#resultsTable tbody");
            tbody.innerHTML = "";
            filteredData.forEach(row => {
                const tr = document.createElement("tr");
                if (row.statusNote.includes("ERR")) tr.className = "row-err";
                else if (row.statusNote.includes("WARN")) tr.className = "row-warn";
                else if (row.statusNote.includes("Alias")) tr.className = "row-alias";
                else if (row.statusNote.includes("Baseplate") || row.statusNote.includes("Plate Calc")) tr.className = "row-plate";
                
                tr.innerHTML = `<td>${row.guid}</td><td>${row.type}</td><td>${row.layer}</td><td>${row.profile}</td>
                                <td>${row.lenStd}</td><td>${row.lenSpan}</td><td>${row.lenCut}</td>
                                <td class="col-used">${row.lenUsed}</td><td>${row.tn}</td><td>${row.statusNote}</td>`;
                tbody.appendChild(tr);
            });
            document.getElementById('resultsContainer').style.display = "block";
            document.getElementById('exportBtn').style.display = "block";
        }

        function sortTable(column) {
            sortDirection[column] = !sortDirection[column];
            filteredData.sort((a, b) => {
                let valA = a[column];
                let valB = b[column];
                if (valA !== "" && valB !== "" && !isNaN(valA) && !isNaN(valB)) {
                    valA = parseFloat(valA);
                    valB = parseFloat(valB);
                }
                if (valA < valB) return sortDirection[column] ? -1 : 1;
                if (valA > valB) return sortDirection[column] ? 1 : -1;
                return 0;
            });
            renderTable();
        }

        document.getElementById('exportBtn').onclick = function() {
            let csv = "data:text/csv;charset=utf-8,GUID,Type,Layer,Profile,Length,Span,Cut_Length,Used_mm,Weight_tn,Status\n";
            filteredData.forEach(r => {
                const safeGuid = r.guid.toString().replace(/,/g, "");
                const safeType = r.type.toString().replace(/,/g, "");
                const safeLayer = r.layer.toString().replace(/,/g, "");
                const safeProf = r.profile.toString().replace(/,/g, "");
                const safeStat = r.statusNote.toString().replace(/,/g, "");
                
                csv += `${safeGuid},${safeType},${safeLayer},${safeProf},${r.lenStd},${r.lenSpan},${r.lenCut},${r.lenUsed},${r.tn},${safeStat}\n`;
            });
            const link = document.createElement("a");
            link.setAttribute("href", encodeURI(csv));
            link.setAttribute("download", "steel_audit_report.csv");
            link.click();
        };
    </script>
</body>
</html>
